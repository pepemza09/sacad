name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v5
      - name: Validate Docker Compose
        run: |
          docker compose config -q
          docker compose -f docker-compose.prod.yml config -q
      - name: Deploy to Google Cloud via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.ORACLE_PROJECT_DIR }}

            echo "=== Backup DB ==="
            COMPOSE_FILE=docker-compose.prod.yml ./scripts/backup.sh

            echo "=== Pull latest code ==="
            git fetch origin main && git reset --hard origin/main || (git fetch --unshallow && git fetch origin main && git reset --hard origin/main)

            echo "=== Force stop old containers ==="
            docker compose -f docker-compose.prod.yml down --remove-orphans 2>/dev/null || true

            echo "=== Rebuild and restart ==="
            docker compose -f docker-compose.prod.yml build
            docker compose -f docker-compose.prod.yml up -d --force-recreate --remove-orphans || {
              echo "=== Deep cleanup and retry ==="
              docker compose -f docker-compose.prod.yml down --remove-orphans 2>/dev/null || true
              docker container prune -f 2>/dev/null || true
              docker network prune -f 2>/dev/null || true
              docker compose -f docker-compose.prod.yml up -d --force-recreate --remove-orphans
            }

            echo "=== Clean old images ==="
            docker image prune -f

            echo "=== Deploy complete ==="
