services:
  db:
    image: postgres:16-alpine
    volumes:
      - sacad_postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-sacad}
      POSTGRES_USER: ${DB_USER:-sacad}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sacad}
      POSTGRES_CONFIG_FILE: /etc/postgresql/postgresql.conf
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sacad}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=512MB
      -c effective_cache_size=1536MB
      -c maintenance_work_mem=128MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=8MB
      -c min_wal_size=1GB
      -c max_wal_size=4GB

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    environment:
      DJANGO_SETTINGS_MODULE: sacad.settings.development
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      DEBUG: "True"
      DB_NAME: ${DB_NAME:-sacad}
      DB_USER: ${DB_USER:-sacad}
      DB_PASSWORD: ${DB_PASSWORD:-sacad}
      DB_HOST: db
      DB_PORT: "5432"
      DB_CONN_MAX_AGE: "60"
      REDIS_URL: redis://redis:6379/0
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      SACAD_DOMAIN_RESTRICTION: ${SACAD_DOMAIN_RESTRICTION:-@fce.uncu.edu.ar}
      CORS_ALLOWED_ORIGINS: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  sacad_postgres_data:
  redis_data:
  static_volume:
  media_volume:
